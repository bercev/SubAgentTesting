name: gemini-2.5-flash-tools-mini
backend:
  type: openrouter
  model: google/gemini-2.5-flash
  max_retries: 30
  initial_backoff_s: 0.5
  max_backoff_s: 4.0
prompt_file: ../prompts/engineering_agent_v1.txt

agent_architecture: mini-swe-agent
agent_architecture_config: {}
tools:
  - submit
  - workspace_list
  - workspace_open
  - workspace_search
  - workspace_apply_patch
  - workspace_write
  - bash

tool_to_skill_map: {}
termination:
  tool: submit
  output_type: patch
decoding_defaults:
  temperature: 0.1
  top_p: 0.95
  max_tokens: 8192
