name: qwen3-coder-free-mini
backend:
  type: openrouter
  model: qwen/qwen3-coder:free
prompt_file: ../prompts/engineering_agent_v1.txt

agent_architecture: mini-swe-agent
agent_architecture_config: {}

tools:
  - bash
  - submit
  - workspace_apply_patch
  - workspace_list
  - workspace_open
  - workspace_search
  - workspace_write
skills:
  - tool-use-protocol
  - repo-triage
  - diff-hygiene
  - test-triage-loop

tool_to_skill_map: {}
termination:
  tool: submit
  output_type: patch
decoding_defaults:
  temperature: 0.1
  top_p: 0.95
  max_tokens: 4096
